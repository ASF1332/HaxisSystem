<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaxisSystem</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

        /* ========== LOGIN ========== */
        #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .login-box { background: #1e293b; padding: 40px; border-radius: 16px; border: 1px solid #334155; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-brand { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 18px; }
        .login-box h1 { text-align: center; color: #38bdf8; margin-bottom: 0; font-size: 28px; line-height: 1; }
        .brand-mark { width: 60px; height: 60px; object-fit: contain; display: block; margin: 0; }
        .sidebar-brand { display: flex; align-items: center; justify-content: center; gap: 8px; text-align: left; }
        .sidebar-brand img { width: 42px; height: 42px; object-fit: contain; }
        .login-box .subtitle { text-align: center; color: #64748b; margin-bottom: 30px; font-size: 14px; }
        .login-box label { display: block; color: #94a3b8; font-size: 13px; margin-bottom: 6px; }
        .login-box input { width: 100%; padding: 12px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 14px; margin-bottom: 16px; }
        .login-box input:focus { outline: none; border-color: #38bdf8; }
        .login-btn { width: 100%; padding: 12px; background: #0ea5e9; border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .login-btn:hover { background: #0284c7; }
        .login-error { background: #dc262622; border: 1px solid #dc2626; color: #fca5a5; padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 12px; display: none; }

        /* ========== LAYOUT ========== */
        #app-screen { display: none; }
        .layout { display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar { width: 240px; background: #1e293b; border-right: 1px solid #334155; padding: 0; flex-shrink: 0; position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #334155; }
        .sidebar-header h2 { color: #38bdf8; font-size: 20px; }
        .sidebar nav { padding: 12px 0; }
        .sidebar nav a { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: #94a3b8; text-decoration: none; font-size: 14px; transition: all 0.15s; }
        .sidebar nav a:hover { background: #334155; color: #e2e8f0; }
        .sidebar nav a.active { background: #0ea5e922; color: #38bdf8; border-left: 3px solid #38bdf8; }
        .sidebar nav a .icon { font-size: 18px; width: 24px; text-align: center; }
        .sidebar-logout { margin-top: auto; border-top: 1px solid #334155; padding-top: 12px; }

        /* Main */
        .main { margin-left: 240px; flex: 1; }
        .topbar { background: #1e293b; border-bottom: 1px solid #334155; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .topbar h2 { font-size: 20px; color: #e2e8f0; }
        .topbar-user { display: flex; align-items: center; gap: 12px; padding: 8px 14px; border: 1px solid #334155; border-radius: 16px; background: #0f172a; }
        .topbar-avatar { width: 44px; height: 44px; border-radius: 14px; display: grid; place-items: center; color: #38bdf8; background: rgba(14, 165, 233, 0.16); border: 1px solid currentColor; flex-shrink: 0; }
        .topbar-avatar svg { width: 24px; height: 24px; stroke: currentColor; }
        .topbar-identity { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
        .topbar-identity .name { color: #e2e8f0; font-size: 14px; font-weight: 700; line-height: 1.1; }
        .topbar-identity .role { color: #94a3b8; font-size: 12px; line-height: 1.1; }
        .topbar-user.role-serralheiro .topbar-avatar { color: #f59e0b; background: rgba(245, 158, 11, 0.16); }
        .topbar-user.role-mecanico .topbar-avatar { color: #22c55e; background: rgba(34, 197, 94, 0.16); }
        .topbar-user.role-automacao .topbar-avatar { color: #38bdf8; background: rgba(56, 189, 248, 0.16); }
        .topbar-user.role-dev .topbar-avatar { color: #a78bfa; background: rgba(167, 139, 250, 0.16); }
        .topbar-user.role-gestor .topbar-avatar { color: #f97316; background: rgba(249, 115, 22, 0.16); }
        .content { padding: 24px; }

        /* ========== CARDS / STATS ========== */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #38bdf8; }
        .stat-card .label { color: #94a3b8; font-size: 13px; margin-top: 4px; }
        .stat-card.danger .number { color: #ef4444; }
        .stat-card.success .number { color: #22c55e; }
        .stat-card.warning .number { color: #f59e0b; }

        /* ========== BADGES ========== */
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge.PLANEJAMENTO { background: #f59e0b22; color: #f59e0b; }
        .badge.EM_ANDAMENTO { background: #3b82f622; color: #3b82f6; }
        .badge.AGUARDANDO_MATERIAL { background: #f9731622; color: #f97316; }
        .badge.EM_REVISAO { background: #a855f722; color: #a855f7; }
        .badge.CONCLUIDO { background: #22c55e22; color: #22c55e; }
        .badge.CANCELADO { background: #ef444422; color: #ef4444; }
        .badge.NAO_INICIADO { background: #94a3b822; color: #cbd5e1; }
        .badge.ATRASADO { background: #ef444422; color: #f87171; }
        .badge.AUTOMACAO { background: #06b6d422; color: #06b6d4; }
        .badge.MECANICA { background: #22c55e22; color: #22c55e; }
        .badge.DEV { background: #a78bfa22; color: #a78bfa; }

        /* ========== TABLE ========== */
        .table-wrapper { background: #1e293b; border: 1px solid #334155; border-radius: 12px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: #0f172a; }
        th { padding: 12px 16px; text-align: left; font-size: 12px; color: #94a3b8; font-weight: 600; text-transform: uppercase; }
        td { padding: 12px 16px; border-top: 1px solid #334155; font-size: 14px; }
        tbody tr:hover { background: #33415522; }
        .empty { text-align: center; padding: 40px; color: #64748b; }

        /* ========== BUTTONS ========== */
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .btn-primary { background: #0ea5e9; color: white; }
        .btn-primary:hover { background: #0284c7; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .btn-success { background: #22c55e; color: white; }
        .btn-success:hover { background: #16a34a; }
        .btn-outline { background: transparent; border: 1px solid #334155; color: #94a3b8; }
        .btn-outline:hover { border-color: #38bdf8; color: #38bdf8; }
        .actions { display: flex; gap: 6px; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
        .filters { display: flex; gap: 8px; flex-wrap: wrap; }
        .filters select, .filters input { padding: 6px 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 13px; }

        /* ========== MODAL ========== */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 24px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .modal h3 { color: #38bdf8; margin-bottom: 16px; }
        .modal label { display: block; color: #94a3b8; font-size: 13px; margin-bottom: 4px; margin-top: 12px; }
        .modal input, .modal select, .modal textarea { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 14px; }
        .modal textarea { min-height: 80px; resize: vertical; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

        /* ========== MEDIA GRID ========== */
        .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
        .media-card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; overflow: hidden; }
        .media-card img, .media-card video { width: 100%; height: 160px; object-fit: cover; }
        .media-card .info { padding: 10px; }
        .media-card .info p { font-size: 12px; color: #94a3b8; }
        .project-summary { display: flex; align-items: center; gap: 14px; min-width: 240px; }
        .project-summary-text strong { display: block; color: #e2e8f0; font-size: 15px; margin-bottom: 4px; }
        .project-summary-text span { color: #94a3b8; font-size: 12px; }
        .project-cover-button { border: 0; padding: 0; background: transparent; cursor: pointer; display: inline-flex; }
        .project-cover-button:focus-visible { outline: 2px solid #38bdf8; outline-offset: 3px; border-radius: 14px; }
        .project-cover-thumb { width: 132px; height: 88px; object-fit: cover; border-radius: 14px; border: 1px solid #334155; background: #0f172a; display: block; }
        .project-cover-placeholder { width: 132px; height: 88px; border-radius: 14px; border: 1px dashed #334155; background: #0f172a; color: #64748b; display: grid; place-items: center; font-size: 11px; text-transform: uppercase; flex-shrink: 0; }
        .project-cover-preview { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; border: 1px solid #334155; margin-top: 8px; }

        /* ========== PROJECT DETAIL ========== */
        .detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .detail-header h3 { font-size: 24px; color: #e2e8f0; }
        .detail-meta { display: flex; gap: 8px; flex-wrap: wrap; }
        .detail-section { margin-bottom: 24px; }
        .detail-section h4 { color: #94a3b8; font-size: 13px; margin-bottom: 8px; text-transform: uppercase; }
        .detail-section p { color: #e2e8f0; }
        .project-detail-main { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
        .project-cover-detail { width: 220px; height: 146px; object-fit: cover; border-radius: 16px; border: 1px solid #334155; background: #0f172a; display: block; }
        .project-detail-info { flex: 1; min-width: 260px; }
        .schedule-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 18px; }
        .schedule-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 14px; }
        .schedule-card .label { color: #94a3b8; font-size: 12px; text-transform: uppercase; margin-bottom: 6px; }
        .schedule-card .value { color: #e2e8f0; font-size: 24px; font-weight: 700; }
        .schedule-layout { display: grid; gap: 16px; align-items: start; }
        .schedule-table td, .schedule-table th { vertical-align: top; }
        .schedule-title-cell strong { color: #e2e8f0; display: block; margin-bottom: 4px; }
        .schedule-title-cell span { color: #94a3b8; font-size: 12px; }
        .progress-bar { width: 100%; height: 8px; background: #0f172a; border-radius: 999px; overflow: hidden; border: 1px solid #334155; margin-top: 6px; }
        .progress-bar > span { display: block; height: 100%; background: linear-gradient(90deg, #38bdf8, #22c55e); }
        .gantt-board { background: #1e293b; border: 1px solid #334155; border-radius: 14px; overflow: auto; }
        .gantt-grid { display: grid; min-width: max-content; }
        .gantt-corner { position: sticky; left: 0; z-index: 3; background: #0f172a; border-right: 1px solid #334155; border-bottom: 1px solid #334155; min-width: 220px; padding: 12px 14px; color: #cbd5e1; font-size: 12px; text-transform: uppercase; }
        .gantt-date-cell { background: #0f172a; border-bottom: 1px solid #334155; border-right: 1px solid #334155; width: 42px; min-width: 42px; padding: 8px 4px; text-align: center; color: #94a3b8; font-size: 11px; }
        .gantt-date-cell strong { display: block; color: #e2e8f0; font-size: 12px; }
        .gantt-task-cell { position: sticky; left: 0; z-index: 2; background: #1e293b; border-right: 1px solid #334155; border-bottom: 1px solid #334155; padding: 10px 14px; min-width: 220px; }
        .gantt-task-cell strong { display: block; color: #e2e8f0; margin-bottom: 4px; }
        .gantt-task-cell span { color: #94a3b8; font-size: 12px; }
        .gantt-row-track { position: relative; grid-column: 2 / -1; height: 62px; background-image: linear-gradient(to right, #334155 1px, transparent 1px); background-size: 42px 100%; border-bottom: 1px solid #334155; }
        .gantt-bar { position: absolute; top: 14px; height: 34px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 0 12px; color: #fff; font-size: 12px; font-weight: 600; box-shadow: 0 8px 20px rgba(15, 23, 42, 0.28); }
        .gantt-bar small { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.88); }
        .schedule-empty { padding: 24px; border: 1px dashed #334155; border-radius: 12px; text-align: center; color: #94a3b8; }
        .pdf-print { display: none; }
        .image-modal { max-width: min(92vw, 1100px); padding: 18px; background: transparent; border: 0; box-shadow: none; }
        .image-modal-content { position: relative; }
        .image-modal-content img { width: 100%; max-height: 82vh; object-fit: contain; border-radius: 16px; background: #020617; border: 1px solid #334155; }
        .image-modal-close { position: absolute; top: 12px; right: 12px; width: 40px; height: 40px; border: 0; border-radius: 999px; background: rgba(15, 23, 42, 0.9); color: #fff; font-size: 22px; cursor: pointer; }
        .image-modal-caption { margin-top: 10px; text-align: center; color: #cbd5e1; font-size: 13px; }

        @media (max-width: 768px) {
            .project-summary { align-items: flex-start; }
            .project-cover-thumb, .project-cover-placeholder { width: 108px; height: 72px; }
            .project-cover-detail { width: 100%; max-width: 320px; height: auto; aspect-ratio: 3 / 2; }
            .gantt-corner, .gantt-task-cell { min-width: 170px; }
        }

        /* ========== TOAST ========== */
        .toast { position: fixed; bottom: 20px; right: 20px; background: #22c55e; color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; display: none; z-index: 9999; }
        .toast.error { background: #dc2626; }
        .toast.show { display: block; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* ========== MOVE INVENTORY ========== */
        .move-row { display: flex; gap: 8px; align-items: center; }
        .move-row input { width: 80px; }

        /* ========== BACK LINK ========== */
        .back-link { color: #38bdf8; cursor: pointer; font-size: 13px; margin-bottom: 12px; display: inline-block; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<!-- ========== LOGIN ========== -->
<div id="login-screen">
    <div class="login-box">
        <div class="login-brand">
            <img src="/logo-haxis.png" alt="Logo Haxis" class="brand-mark">
            <h1>HaxisSystem</h1>
        </div>
        <p class="subtitle">Sistema de Gestão de Projetos</p>
        <div class="login-error" id="login-error">Credenciais inválidas.</div>
        <form onsubmit="doLogin(event)">
            <label>Email ou Nome</label>
            <input id="login-email" placeholder="teste@email.com" required>
            <label>Senha</label>
            <input id="login-password" type="password" placeholder="123456" required>
            <button class="login-btn" type="submit">Entrar</button>
        </form>
    </div>
</div>

<!-- ========== APP ========== -->
<div id="app-screen">
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <img src="/logo-haxis.png" alt="Logo Haxis">
                    <h2>HaxisSystem</h2>
                </div>
            </div>
            <nav>
                <a href="#" class="active" onclick="navigate('dashboard', this)"><span class="icon">📊</span> Dashboard</a>
                <a href="#" onclick="navigate('projects', this)"><span class="icon">📋</span> Projetos</a>
                <a href="#" onclick="navigate('inventory', this)"><span class="icon">📦</span> Estoque</a>
                <a href="#" onclick="navigate('media-all', this)"><span class="icon">📸</span> Todas as Mídias</a>
            </nav>
            <div class="sidebar-logout">
                <nav>
                    <a href="#" onclick="doLogout()"><span class="icon">🚪</span> Sair</a>
                </nav>
            </div>
        </aside>
        <div class="main">
            <div class="topbar">
                <h2 id="page-title">Dashboard</h2>
                <div class="topbar-user" id="topbar-user-card">
                    <div class="topbar-avatar" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 21v-2a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v2"></path>
                            <circle cx="12" cy="8" r="5"></circle>
                        </svg>
                    </div>
                    <div class="topbar-identity">
                        <span class="name" id="topbar-name">Usuário</span>
                        <span class="role" id="topbar-role">Cargo</span>
                    </div>
                </div>
            </div>
            <div class="content" id="content"></div>
        </div>
    </div>
</div>

<!-- ========== MODAL ========== -->
<div class="modal-overlay" id="modal">
    <div class="modal" id="modal-content"></div>
</div>

<!-- ========== TOAST ========== -->
<div class="toast" id="toast"></div>

<script>
const API = '/api';
let token = null;
let currentUser = null;
const inventoryCategoryLabels = {
    SERRALHERIA: 'Serralheria',
    MECANICA: 'Mecânica',
    ELETRICA: 'Elétrica',
    PNEUMATICA: 'Pneumática',
    OUTROS: 'Outros'
};
const projectSectorLabels = {
    AUTOMACAO: 'Automação',
    MECANICA: 'Mecânica',
    DEV: 'Dev'
};
const scheduleStatusLabels = {
    NAO_INICIADO: 'Nao iniciado',
    EM_ANDAMENTO: 'Em andamento',
    CONCLUIDO: 'Concluido',
    ATRASADO: 'Atrasado'
};
const roleMeta = {
    GESTOR: { label: 'Gestor', className: 'role-gestor' },
    PROGRAMADOR: { label: 'Dev', className: 'role-dev' },
    DESENVOLVEDOR: { label: 'Dev', className: 'role-dev' },
    ENGENHEIRO_MECANICO: { label: 'Mecânico', className: 'role-mecanico' },
    MECANICO: { label: 'Mecânico', className: 'role-mecanico' },
    ENGENHEIRO_ELETRICO: { label: 'Automação', className: 'role-automacao' },
    AUTOMACAO: { label: 'Automação', className: 'role-automacao' },
    SERRALHEIRO: { label: 'Serralheiro', className: 'role-serralheiro' }
};

// ========== AUTH ==========
async function doLogin(e) {
    e.preventDefault();
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');

    try {
        const res = await fetch(`${API}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
            errEl.textContent = data.message || 'Erro ao fazer login.';
            errEl.style.display = 'block';
            return;
        }

        token = data.token;
        currentUser = data.user;
        errEl.style.display = 'none';
        showApp();
    } catch (err) {
        errEl.textContent = 'Erro de conexão com o servidor.';
        errEl.style.display = 'block';
    }
}

function doLogout() {
    token = null;
    currentUser = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
}

function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    const roleInfo = roleMeta[currentUser.role] || { label: currentUser.role.replace(/_/g, ' '), className: 'role-gestor' };
    const userCard = document.getElementById('topbar-user-card');
    document.getElementById('topbar-name').textContent = currentUser.name;
    document.getElementById('topbar-role').textContent = roleInfo.label;
    userCard.className = `topbar-user ${roleInfo.className}`;
    navigate('dashboard');
}

// ========== NAV ==========
function navigate(page, linkEl) {
    if (linkEl) {
        document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
        linkEl.classList.add('active');
    }
    const titles = { dashboard: 'Dashboard', projects: 'Projetos', inventory: 'Estoque', 'media-all': 'Todas as Mídias', 'project-detail': 'Detalhes do Projeto' };
    document.getElementById('page-title').textContent = titles[page] || '';
    const content = document.getElementById('content');

    switch(page) {
        case 'dashboard': renderDashboard(content); break;
        case 'projects': renderProjects(content); break;
        case 'inventory': renderInventory(content); break;
        case 'media-all': renderAllMedia(content); break;
        case 'project-detail': break; // handled by showProjectDetail
    }
}

// ========== TOAST ==========
function toast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 3000);
}

// ========== MODAL ==========
function openModal(html, modalClass = '') {
    const modalContent = document.getElementById('modal-content');
    modalContent.className = `modal ${modalClass}`.trim();
    modalContent.innerHTML = html;
    document.getElementById('modal').classList.add('active');
}

function formatDateBR(value) {
    return value ? new Date(value).toLocaleDateString('pt-BR') : '-';
}

function getScheduleSummary(schedule) {
    const total = schedule.length;
    const completed = schedule.filter(item => item.status === 'CONCLUIDO').length;
    const delayed = schedule.filter(item => item.status === 'ATRASADO').length;
    const averageProgress = total
        ? Math.round(schedule.reduce((sum, item) => sum + (Number(item.progress) || 0), 0) / total)
        : 0;

    return { total, completed, delayed, averageProgress };
}

function addDays(date, amount) {
    const copy = new Date(date);
    copy.setDate(copy.getDate() + amount);
    return copy;
}

function diffDays(start, end) {
    const msPerDay = 24 * 60 * 60 * 1000;
    return Math.max(0, Math.round((end - start) / msPerDay));
}

function buildScheduleTimeline(schedule) {
    if (!schedule.length) {
        return { days: [], rows: [] };
    }

    const palette = [
        { solid: '#0ea5e9', soft: '#38bdf8' },
        { solid: '#22c55e', soft: '#4ade80' },
        { solid: '#f97316', soft: '#fb923c' },
        { solid: '#a855f7', soft: '#c084fc' },
        { solid: '#e11d48', soft: '#fb7185' },
        { solid: '#14b8a6', soft: '#2dd4bf' }
    ];
    const starts = schedule.map(item => new Date(item.startDate));
    const ends = schedule.map(item => new Date(item.endDate));
    const minDate = new Date(Math.min(...starts.map(date => date.getTime())));
    const maxDate = new Date(Math.max(...ends.map(date => date.getTime())));
    const totalDays = diffDays(minDate, maxDate) + 1;
    const days = Array.from({ length: totalDays }, (_, index) => addDays(minDate, index));

    const rows = schedule.map((item, index) => {
        const start = new Date(item.startDate);
        const end = new Date(item.endDate);
        const startOffset = diffDays(minDate, start);
        const duration = diffDays(start, end) + 1;
        const color = palette[index % palette.length];

        return {
            ...item,
            startOffset,
            duration,
            color,
            durationLabel: duration === 1 ? '1 dia' : `${duration} dias`
        };
    });

    return { days, rows };
}

            <div class="schedule-summary">

                <div class="schedule-card"><div class="label">Concluidas</div><div class="value">${summary.completed}</div></div>
                <div class="schedule-card"><div class="label">Atrasadas</div><div class="value">${summary.delayed}</div></div>

            </div>

            ${schedule.length === 0 ? `

            ` : `
                <div class="schedule-layout">

                            <div class="gantt-corner">Tarefas / Datas</div>
                            ${timeline.days.map(day => `
                                <div class="gantt-date-cell">
                                    <strong>${day.toLocaleDateString('pt-BR', { day: '2-digit' })}</strong>

                            ${timeline.rows.map(item => `

                                </div>
                                <div class="gantt-row-track">
                                    <div

                                        style="
                                            left: calc(${item.startOffset} * 42px + 4px);

// ========== API HELPERS ==========
async function api(url, opts = {}) {
    const headers = { ...opts.headers };
    if (token && !opts.noAuth) {
        headers['Authorization'] = `Bearer ${token}`;
    }
    if (!(opts.body instanceof FormData)) {
        headers['Content-Type'] = 'application/json';
    }
    const res = await fetch(`${API}${url}`, { ...opts, headers });
    const data = await res.json();
    if (!res.ok) {
        toast(data.message || 'Erro na requisição.', true);
        throw new Error(data.message);
    }
    return data;
}

function filterProjects() {
    const sector = document.getElementById('filter-sector')?.value || '';
    const status = document.getElementById('filter-status')?.value || '';
    const tbody = document.getElementById('projects-tbody');
    if (!tbody) return;

    api('/projects').then(projects => {
        let filtered = projects;
        if (sector) filtered = filtered.filter(p => p.sector === sector);
        if (status) filtered = filtered.filter(p => p.status === status);

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty">Nenhum projeto encontrado.</td></tr>';
            return;
        }

        tbody.innerHTML = filtered.map(p => `
            <tr>
                <td>
                    <div class="project-summary">
                        ${p.coverImageUrl
                            ? `<button type="button" class="project-cover-button" onclick="openImagePopup('${p.coverImageUrl}', 'Capa de ${p.title}')"><img src="${p.coverImageUrl}" alt="Capa de ${p.title}" class="project-cover-thumb"></button>`
                            : '<div class="project-cover-placeholder">Sem imagem</div>'}
                        <div class="project-summary-text">
                            <strong>${p.title}</strong>
                            <span>${p.coverImageUrl ? 'Clique na imagem para ampliar' : 'Sem capa cadastrada'}</span>
                        </div>
                    </div>
                </td>
                <td><span class="badge ${p.sector}">${projectSectorLabels[p.sector] || p.sector}</span></td>
                <td><span class="badge ${p.status}">${p.status.replace(/_/g, ' ')}</span></td>
                <td>${p.startDate ? new Date(p.startDate).toLocaleDateString('pt-BR') : '-'}</td>
                <td>${p.endDate ? new Date(p.endDate).toLocaleDateString('pt-BR') : '-'}</td>
                <td><div class="actions">
                    <button class="btn btn-outline btn-sm" onclick="showProjectDetail('${p.id}')">Ver</button>

                    <button class="btn btn-danger btn-sm" onclick="deleteProject('${p.id}')">Excluir</button>
                </div></td>
            </tr>
        `).join('');
    });
}

function fillProjectForm(p) {
    document.getElementById('m-p-title').value = p.title || '';
    document.getElementById('m-p-desc').value = p.description || '';
    document.getElementById('m-p-sector').value = p.sector || '';
    document.getElementById('m-p-status').value = p.status || 'PLANEJAMENTO';
    document.getElementById('m-p-start').value = p.startDate || '';
    document.getElementById('m-p-end').value = p.endDate || '';
    document.getElementById('m-p-cover-preview').innerHTML = p.coverImageUrl
        ? `<img src="${p.coverImageUrl}" alt="Capa atual" class="project-cover-preview">`
        : '';
}

async function saveProject(e, id) {
    e.preventDefault();
    const coverFile = document.getElementById('m-p-cover').files[0];
    const body = {
        title: document.getElementById('m-p-title').value,
        description: document.getElementById('m-p-desc').value,
        sector: document.getElementById('m-p-sector').value,
        status: document.getElementById('m-p-status').value,
        startDate: document.getElementById('m-p-start').value,
        endDate: document.getElementById('m-p-end').value || null
    };

    try {
        let project;
        if (id) {
            project = await api(`/projects/${id}`, { method: 'PUT', body: JSON.stringify(body) });
            toast('Projeto atualizado!');
        } else {
            project = await api('/projects', { method: 'POST', body: JSON.stringify(body) });
            toast('Projeto criado!');
        }
        if (coverFile) {
            await uploadProjectCover(project.id, coverFile);
        }
        closeModal();
        renderProjects(document.getElementById('content'));
    } catch(e) {}
}

async function uploadProjectCover(projectId, file) {
    const formData = new FormData();
    formData.append('coverImage', file);

    const res = await fetch(`${API}/projects/${projectId}/cover`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'Erro ao enviar capa do projeto.');
    return data;
}

async function deleteProject(id) {
    if (!confirm('Tem certeza que deseja excluir este projeto?')) return;
    try {
        await api(`/projects/${id}`, { method: 'DELETE' });
        toast('Projeto excluído!');
        renderProjects(document.getElementById('content'));
    } catch(e) {}
}

async function openScheduleItemModal(projectId, itemId = null) {
    const project = await api(`/projects/${projectId}`);
    const schedule = project.schedule || [];
    const item = itemId
        ? schedule.find(entry => entry.id === itemId)
        : null;
    const dependencies = schedule.filter(entry => entry.id !== itemId);

    openModal(`
        <h3>${item ? 'Editar' : 'Nova'} Etapa</h3>
        <form onsubmit="saveScheduleItem(event, '${projectId}', '${itemId || ''}')">
            <label>Titulo da Etapa</label>
            <input id="m-s-title" value="${escapeHtml(item?.title || '')}" required>
            <label>Responsavel</label>
            <input id="m-s-responsible" value="${escapeHtml(item?.responsible || '')}" placeholder="Ex: Andre / Will / Equipe Mec" >
            <label>Status</label>
            <select id="m-s-status" required>
                ${Object.entries(scheduleStatusLabels).map(([value, label]) => `
                    <option value="${value}" ${(item?.status || 'NAO_INICIADO') === value ? 'selected' : ''}>${label}</option>
                `).join('')}
            </select>
            <label>Data de Inicio</label>
            <input id="m-s-start" type="date" value="${item?.startDate || ''}" required>
            <label>Data de Fim</label>
            <input id="m-s-end" type="date" value="${item?.endDate || ''}" required>
            <label>Progresso (%)</label>
            <input id="m-s-progress" type="number" min="0" max="100" value="${Number(item?.progress) || 0}" required>
            <label>Depende de</label>
            <select id="m-s-dependency">
                <option value="">Nenhuma</option>
                ${dependencies.map(entry => `
                    <option value="${entry.id}" ${item?.dependencyId === entry.id ? 'selected' : ''}>${escapeHtml(entry.title)}</option>
                `).join('')}
            </select>
            <p style="color:#94a3b8;font-size:12px;margin-top:8px;">Use este campo quando a etapa atual so pode começar depois de outra terminar.</p>
            <label>Observacoes</label>
            <textarea id="m-s-notes">${escapeHtml(item?.notes || '')}</textarea>
            <div class="modal-actions">
                <button class="btn btn-outline" type="button" onclick="closeModal()">Cancelar</button>
                <button class="btn btn-primary" type="submit">Salvar</button>
            </div>
        </form>
    `);
}

async function saveScheduleItem(event, projectId, itemId) {
    event.preventDefault();
    const project = await api(`/projects/${projectId}`);
    const dependencyId = document.getElementById('m-s-dependency').value || null;

    const body = {
        title: document.getElementById('m-s-title').value,
        responsible: document.getElementById('m-s-responsible').value,
        status: document.getElementById('m-s-status').value,
        startDate: document.getElementById('m-s-start').value,
        endDate: document.getElementById('m-s-end').value,
        progress: Number(document.getElementById('m-s-progress').value) || 0,
        dependencyId,
        notes: document.getElementById('m-s-notes').value
    };

    if (new Date(body.endDate) < new Date(body.startDate)) {
        toast('A data final nao pode ser menor que a inicial.', true);
        return;
    }

    if (dependencyId) {
        const dependency = (project.schedule || []).find(item => item.id === dependencyId);
        if (dependency && new Date(body.startDate) < new Date(dependency.endDate)) {
            const proceed = confirm(`A etapa selecionada em "Depende de" termina em ${formatDateBR(dependency.endDate)}. Deseja salvar mesmo assim?`);
            if (!proceed) return;
        }
    }

    try {
        if (itemId) {
            await api(`/projects/${projectId}/schedule/${itemId}`, {
                method: 'PUT',
                body: JSON.stringify(body)
            });
            toast('Etapa atualizada!');
        } else {
            await api(`/projects/${projectId}/schedule`, {
                method: 'POST',
                body: JSON.stringify(body)
            });
            toast('Etapa criada!');
        }

        closeModal();
        showProjectDetail(projectId);
    } catch (error) {}
}

async function deleteScheduleItem(projectId, itemId) {
    if (!confirm('Excluir esta etapa do cronograma?')) return;

    try {
        await api(`/projects/${projectId}/schedule/${itemId}`, { method: 'DELETE' });
        toast('Etapa excluida!');
        showProjectDetail(projectId);
    } catch (error) {}
}

function openMediaUploadModal(projectId) {
    openModal(`
        <h3>Upload de Mídia</h3>
        <form onsubmit="uploadMedia(event, '${projectId}')">
            <label>Arquivo (imagem ou vídeo)</label>
            <input id="m-file" type="file" accept="image/*,video/*" required>

            <input id="m-desc" placeholder="Descrição da foto/vídeo">

async function uploadMedia(e, projectId) {
    e.preventDefault();
    const fileInput = document.getElementById('m-file');
    const desc = document.getElementById('m-desc').value;
    const formData = new FormData();
    formData.append('file', fileInput.files[0]);
    formData.append('projectId', projectId);
    formData.append('description', desc);

    try {
        const res = await fetch(`${API}/projects/${projectId}/media`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        toast('Mídia enviada com sucesso!');
        closeModal();
        showProjectDetail(projectId);
    } catch(e) {
        toast(e.message, true);
    }
}

    try {
        await api(`/media/${mediaId}`, { method: 'DELETE' });
        toast('Mídia excluída!');
        showProjectDetail(projectId);
    } catch(e) {}
}

// ========== INVENTORY ==========
async function renderInventory(container) {
    container.innerHTML = '<p style="color:#64748b;">Carregando estoque...</p>';
    const items = await api('/inventory');

    container.innerHTML = `
        <div class="toolbar">
            <div class="filters">
                <select id="filter-inv-cat" onchange="filterInventory()">
                    <option value="">Todas categorias</option>
                    <option value="SERRALHERIA">Serralheria</option>
                    <option value="MECANICA">Mecânica</option>
                    <option value="ELETRICA">Elétrica</option>
                    <option value="PNEUMATICA">Pneumática</option>
                    <option value="OUTROS">Outros</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="openItemModal()">+ Novo Item</button>
        </div>
        <div class="table-wrapper">
            <table><thead><tr><th>Nº</th><th>Descrição</th><th>Categoria</th><th>Fabricante</th><th>Código</th><th>Qtd</th><th>Unidade</th><th>Ações</th></tr></thead>
            <tbody id="inventory-tbody"></tbody></table>
        </div>
    `;
    filterInventory();
}

function filterInventory() {
    const cat = document.getElementById('filter-inv-cat')?.value || '';
    const tbody = document.getElementById('inventory-tbody');
    if (!tbody) return;

    api('/inventory').then(items => {
        let filtered = items;
        if (cat) filtered = filtered.filter(i => i.category === cat);

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="empty">Nenhum item encontrado.</td></tr>';
            return;
        }

        tbody.innerHTML = filtered.map(item => `
            <tr>
                <td style="font-weight:bold;color:#38bdf8;">${item.numero}</td>
                <td><strong>${item.description}</strong></td>
                <td>${inventoryCategoryLabels[item.category] || item.category}</td>
                <td>${item.fabricante}</td>
                <td style="font-family:monospace;">${item.codigo}</td>
                <td style="font-weight:bold;">${item.quantity}</td>
                <td>${item.unit}</td>
                <td><div class="actions">
                    <button class="btn btn-success btn-sm" onclick="moveStock(${item.numero}, 'IN')" title="Entrada">📥</button>
                    <button class="btn btn-danger btn-sm" onclick="moveStock(${item.numero}, 'OUT')" title="Saída">📤</button>
                    <button class="btn btn-outline btn-sm" onclick="openItemModal(${item.numero})">✏️</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteItem(${item.numero})">🗑</button>
                </div></td>
            </tr>
        `).join('');
    });
}

async function openItemModal(num = null) {
    const isEdit = !!num;
    let data = { description: '', fabricante: '', codigo: '', category: '', quantity: 0, unit: 'UNIDADE' };

    if (isEdit) {
        data = await api(`/inventory/${num}`);
    }

    // Usa variável global temporária para evitar problema de interpolação
    window._editItemNumero = isEdit ? num : null;

    openModal(`
        <h3>${isEdit ? 'Editar' : 'Novo'} Item</h3>
        <form id="item-form">
            <label>Descrição do Material</label>
            <input id="m-i-desc" value="${escapeHtml(data.description || '')}" placeholder="Ex: Fio AWG 14 vermelho" required>
            <label>Fabricante</label>
            <input id="m-i-fab" value="${escapeHtml(data.fabricante || '')}" placeholder="Ex: Siemens, Prysmian" required>
            <label>Código do Produto</label>
            <input id="m-i-cod" value="${escapeHtml(data.codigo || '')}" placeholder="Ex: 5TT401-0" required>
            <label>Categoria</label>
            <select id="m-i-cat" required>
                <option value="">Selecione</option>
                <option value="SERRALHERIA" ${data.category === 'SERRALHERIA' ? 'selected' : ''}>Serralheria</option>
                <option value="MECANICA" ${data.category === 'MECANICA' ? 'selected' : ''}>Mecânica</option>
                <option value="ELETRICA" ${data.category === 'ELETRICA' ? 'selected' : ''}>Elétrica</option>
                <option value="PNEUMATICA" ${data.category === 'PNEUMATICA' ? 'selected' : ''}>Pneumática</option>
                <option value="OUTROS" ${data.category === 'OUTROS' ? 'selected' : ''}>Outros</option>
            </select>
            <label>Quantidade em Estoque</label>
            <input id="m-i-qty" type="number" min="0" step="any" value="${data.quantity ?? 0}">
            <label>Unidade de Medida</label>
            <select id="m-i-unit" required>
                <option value="UNIDADE" ${data.unit === 'UNIDADE' ? 'selected' : ''}>Unidade</option>
                <option value="METRO" ${data.unit === 'METRO' ? 'selected' : ''}>Metro (m)</option>
                <option value="KG" ${data.unit === 'KG' ? 'selected' : ''}>Quilograma (Kg)</option>
                <option value="LITRO" ${data.unit === 'LITRO' ? 'selected' : ''}>Litro (L)</option>
                <option value="CAIXA" ${data.unit === 'CAIXA' ? 'selected' : ''}>Caixa</option>
                <option value="ROLO" ${data.unit === 'ROLO' ? 'selected' : ''}>Rolo</option>
                <option value="PAR" ${data.unit === 'PAR' ? 'selected' : ''}>Par</option>
            </select>
            <div class="modal-actions">
                <button class="btn btn-outline" type="button" onclick="closeModal()">Cancelar</button>
                <button class="btn btn-primary" type="submit">Salvar</button>
            </div>
        </form>
    `);

    // Bind do submit após inserir o HTML
    document.getElementById('item-form').addEventListener('submit', function(e) {
        e.preventDefault();
        doSaveItem(window._editItemNumero);
    });
}

function escapeHtml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

async function doSaveItem(num) {
    const body = {
        description: document.getElementById('m-i-desc').value,
        fabricante: document.getElementById('m-i-fab').value,
        codigo: document.getElementById('m-i-cod').value,
        category: document.getElementById('m-i-cat').value,
        quantity: parseFloat(document.getElementById('m-i-qty').value) || 0,
        unit: document.getElementById('m-i-unit').value
    };

    try {
        if (num !== null && num !== undefined) {
            await api(`/inventory/${num}`, { method: 'PUT', body: JSON.stringify(body) });
            toast('Item atualizado!');
        } else {
            await api('/inventory', { method: 'POST', body: JSON.stringify(body) });
            toast('Item criado!');
        }
        closeModal();
        renderInventory(document.getElementById('content'));
    } catch(err) {
        console.error('Erro ao salvar item:', err);
    }
}

async function deleteItem(num) {
    if (!confirm('Excluir este item?')) return;
    try {
        await api(`/inventory/${num}`, { method: 'DELETE' });
        toast('Item excluído!');
        renderInventory(document.getElementById('content'));
    } catch(e) {}
}

function moveStock(num, type) {
    openModal(`
        <h3>${type === 'IN' ? '📥 Entrada' : '📤 Saída'} de Estoque</h3>
        <form onsubmit="doMove(event, ${num}, '${type}')">
            <label>Quantidade</label>
            <input id="m-move-qty" type="number" min="0.01" step="any" required>
            <label>Motivo</label>
            <input id="m-move-reason" placeholder="Ex: Compra NF 1234, Projeto Portão" required>
            <div class="modal-actions">
                <button class="btn btn-outline" type="button" onclick="closeModal()">Cancelar</button>
                <button class="btn ${type === 'IN' ? 'btn-success' : 'btn-danger'}" type="submit">Confirmar ${type === 'IN' ? 'Entrada' : 'Saída'}</button>
            </div>
        </form>
    `);
}

async function doMove(e, num, type) {
    e.preventDefault();
    const body = {
        type,
        quantity: parseFloat(document.getElementById('m-move-qty').value),
        reason: document.getElementById('m-move-reason').value
    };
    try {
        await api(`/inventory/${num}/move`, { method: 'POST', body: JSON.stringify(body) });
        toast(`${type === 'IN' ? 'Entrada' : 'Saída'} registrada!`);
        closeModal();
        renderInventory(document.getElementById('content'));
    } catch(e) {}
}
